# Define the services (containers) that make up your application.
services:
  # --- NEW SERVICE: API---
  API:
    build: API
    container_name: API
    ports:
      - "8000:8000"
    expose:
      - "8000"
    command: uvicorn API:app --host 0.0.0.0 --port 8000
    env_file:
      - /opt/secrets.env
    networks:
      projectNetwork:
        ipv4_address: 172.2.2.4

networks:
  projectNetwork:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.2.2.0/28"