# Define the services (containers) that make up your application.
services:
  # --- NEW SERVICE: API---
  api:
    build: api
    container_name: api
    ports:
      - "8000:8000"
    expose:
      - "8000"
    command: uvicorn API:app --host 0.0.0.0 --port 8000
    networks:
      projectNetwork:
        ipv4_address: 172.2.2.4
    volumes:
      - vault_data:/app/database

networks:
  projectNetwork:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.2.2.0/28"

volumes:
  vault_data: